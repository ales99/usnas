<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<meta name="theme-color" content="#07090f" />
<link id="manifest-placeholder" rel="manifest">
<title>NQ Live Checklist</title><style>
:root{
  --bg:#07090f;
  --panel:#101520;
  --panel2:#151b28;
  --border:#253044;
  --text:#edf3ff;
  --muted:#91a0b8;
  --green:#00d26a;
  --red:#ff4a4a;
  --gold:#ffcc42;
  --orange:#ff9b42;
  --cyan:#00d4ff;
  --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Inter,system-ui,sans-serif;
  overflow:hidden;
}

#app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  padding:18px;
  border-bottom:1px solid var(--border);
  background:#0b1018;
}

header h1{
  margin:0;
  font-size:18px;
}

header p{
  margin:6px 0 0;
  color:var(--muted);
  font-size:12px;
}

#tabs{
  display:flex;
  gap:8px;
  padding:10px;
  border-bottom:1px solid var(--border);
  overflow:auto;
}

.tab{
  min-width:70px;
  text-align:center;
  padding:8px 12px;
  border-radius:10px;
  background:var(--panel);
  border:1px solid var(--border);
  font-size:11px;
  color:var(--muted);
}

.tab.active{
  color:white;
  border-color:var(--cyan);
}

.tab.done{
  border-color:var(--green);
}

.tab.warn{
  border-color:var(--orange);
}

#pages{
  flex:1;
  position:relative;
  overflow:hidden;
}

.page{
  position:absolute;
  inset:0;
  overflow-y:auto;
  padding:16px;
  opacity:0;
  transform:translateX(20px);
  pointer-events:none;
  transition:.25s ease;
}

.page.active{
  opacity:1;
  transform:translateX(0);
  pointer-events:auto;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
}

.card.ok{
  border-color:var(--green);
}

.card.bad{
  border-color:var(--red);
}

.label{
  font-size:12px;
  color:var(--muted);
  margin-bottom:12px;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  border:none;
  border-radius:14px;
  padding:14px 16px;
  background:var(--panel2);
  color:white;
  font-weight:700;
}

button.active,
button.sel{
  border:1px solid var(--cyan);
}

.cbadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}

.cb-ok{
  background:rgba(0,210,106,.15);
  color:var(--green);
}

.cb-stop{
  background:rgba(255,74,74,.15);
  color:var(--red);
}

.cb-warn{
  background:rgba(255,155,66,.15);
  color:var(--orange);
}

.cb-wait{
  background:rgba(255,255,255,.08);
  color:var(--muted);
}

.result-card{
  background:var(--panel);
  border-radius:20px;
  border:1px solid var(--border);
  overflow:hidden;
}

.result-inner{
  padding:18px;
}

.result-title{
  font-size:20px;
  font-weight:800;
  margin-bottom:10px;
}

.result-sub{
  color:var(--muted);
  line-height:1.6;
}

.targets{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:18px;
}

.tbox{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
  text-align:center;
}

.tc{
  color:var(--muted);
  font-size:11px;
}

.trr{
  font-size:20px;
  font-weight:800;
  margin:8px 0;
}

.tact{
  font-size:11px;
  color:var(--muted);
}

.result-note{
  margin-top:18px;
  padding:14px;
  border-radius:14px;
  font-size:13px;
}

.timer{
  text-align:center;
  font-size:52px;
  font-weight:800;
  font-family:var(--mono);
  margin:18px 0;
}

.timer.warn{
  color:var(--orange);
}

.timer.danger{
  color:var(--red);
}

#footer{
  display:flex;
  gap:10px;
  padding:14px;
  border-top:1px solid var(--border);
  background:#0b1018;
}

.fnav{
  flex:1;
}

#install-banner{
  position:fixed;
  left:12px;
  right:12px;
  bottom:90px;
  background:#111827;
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px;
  display:none;
  align-items:center;
  justify-content:space-between;
  z-index:100;
}

#install-banner.show{
  display:flex;
}
</style></head>
<body><div id="install-banner">
  <div>
    <div style="font-weight:700">Installa App</div>
    <div style="font-size:12px;color:var(--muted)">Aggiungi NQ Live alla home</div>
  </div>
  <button id="install-btn">INSTALLA</button>
</div><div id="app"><header>
  <h1>NQ Live Checklist</h1>
  <p>TPO + Sweep + Evidence + Timer</p>
</header><div id="tabs">
  <div class="tab active" id="tab-0">BIAS</div>
  <div class="tab" id="tab-1">SWEEP</div>
  <div class="tab" id="tab-2">EVIDENCE</div>
  <div class="tab" id="tab-3">TIMER</div>
  <div class="tab" id="tab-4">ESITO</div>
</div><div id="pages"><div class="page active" id="page-0">  <div class="card" id="card-bias">
    <div class="label">Bias Sessione</div><div class="row">
  <button id="bb-long" onclick="setBias('long')">↑ LONG</button>
  <button id="bb-short" onclick="setBias('short')">↓ SHORT</button>
  <button id="bb-range" onclick="setBias('range')">↔ RANGE</button>
  <button id="bb-dir" onclick="setBias('dir')">→ DIR</button>
</div>

<div style="margin-top:14px">
  <span class="cbadge cb-wait" id="badge-bias">IN ATTESA</span>
</div>

  </div></div><div class="page" id="page-1">  <div class="card" id="card-sweep"><div class="label">Sweep Confermato?</div>

<div class="row">
  <button id="sw-yes" onclick="setSweep(true)">✓ SI</button>
  <button id="sw-no" onclick="setSweep(false)">✕ NO</button>
</div>

<div style="margin-top:14px">
  <span class="cbadge cb-wait" id="badge-sweep">IN ATTESA</span>
</div>

  </div></div><div class="page" id="page-2">  <div class="card"><div class="label">Evidence</div>

<div class="card" id="ev-cvd">
  <div class="row" style="justify-content:space-between;align-items:center">
    <div>CVD / VSA</div>
    <div>
      <button id="cvd-y" onclick="setEv('cvd',true)">SI</button>
      <button id="cvd-n" onclick="setEv('cvd',false)">NO</button>
    </div>
  </div>
</div>

<div class="card" id="ev-bta">
  <div class="row" style="justify-content:space-between;align-items:center">
    <div>BTA</div>
    <div>
      <button id="bta-y" onclick="setEv('bta',true)">SI</button>
      <button id="bta-n" onclick="setEv('bta',false)">NO</button>
    </div>
  </div>
</div>

<div class="card" id="ev-jtc">
  <div class="row" style="justify-content:space-between;align-items:center">
    <div>JTC</div>
    <div>
      <button id="jtc-y" onclick="setEv('jtc',true)">SI</button>
      <button id="jtc-n" onclick="setEv('jtc',false)">NO</button>
    </div>
  </div>
</div>

<div class="row" style="justify-content:space-between;align-items:center;margin-top:12px">
  <span class="cbadge cb-wait" id="badge-ev">0 / 3</span>
  <div id="verdict-mini"></div>
</div>

  </div></div><div class="page" id="page-3">  <div class="card"><div class="label">Timer Trade</div>

<div class="timer" id="timer-display">0:00</div>

<div class="row">
  <button id="tbtn" onclick="timerToggle()">▶ START</button>
  <button onclick="timerReset()">↺ RESET</button>
</div>

<div id="timer-warn" style="margin-top:16px;color:var(--red);display:none">
  ⚠ Trade oltre 2 minuti
</div>

  </div></div><div class="page" id="page-4">
  <div id="esito-content"></div>
</div></div><div id="footer">
  <button class="fnav" onclick="prevPage()">← INDIETRO</button>
  <button class="fnav" onclick="fullReset()">↺ RESET</button>
  <button class="fnav" onclick="nextPage()">AVANTI →</button>
</div></div><script>
const manifestData = {
  name: 'NQ Live Checklist',
  short_name: 'NQ Live',
  description: 'Setup TPO + JTC + CVD/VSA live checklist',
  start_url: './',
  display: 'standalone',
  background_color: '#07090f',
  theme_color: '#07090f',
  orientation: 'portrait',
  icons: [{
    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%2307090f'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle' fill='%2300d4ff' font-family='monospace' font-weight='bold'%3ENQ%3C/text%3E%3C/svg%3E",
    sizes: '192x192',
    type: 'image/svg+xml'
  }]
};

const blob = new Blob([JSON.stringify(manifestData)], {
  type:'application/json'
});

document.getElementById('manifest-placeholder').href = URL.createObjectURL(blob);

if ('serviceWorker' in navigator) {

  const swCode = `
    const CACHE = 'nq-live-v1';

    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(c => c.addAll(['./', './index.html']))
      );

      self.skipWaiting();
    });

    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request))
      );
    });
  `;

  const swBlob = new Blob([swCode], {
    type:'application/javascript'
  });

  navigator.serviceWorker
    .register(URL.createObjectURL(swBlob))
    .catch(()=>{});
}

let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});

document.getElementById('install-btn').addEventListener('click', () => {

  if (deferredPrompt) {

    deferredPrompt.prompt();

    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').classList.remove('show');
    });
  }
});

const S = {
  bias:null,
  sweep:null,
  ev:{
    cvd:null,
    bta:null,
    jtc:null
  }
};

let currentPage = 0;
let timerSec = 0;
let timerRunning = false;
let timerInterval = null;

function saveState() {
  localStorage.setItem('nq-live-state', JSON.stringify({
    S,
    timerSec,
    currentPage
  }));
}

function loadState() {

  const raw = localStorage.getItem('nq-live-state');

  if (!raw) return;

  try {

    const data = JSON.parse(raw);

    if (data.S) {
      S.bias = data.S.bias;
      S.sweep = data.S.sweep;
      S.ev = data.S.ev || {
        cvd:null,
        bta:null,
        jtc:null
      };
    }

    timerSec = data.timerSec || 0;

    if (S.bias) setBias(S.bias);

    if (S.sweep !== null) setSweep(S.sweep);

    Object.entries(S.ev).forEach(([k,v]) => {
      if (v !== null) setEv(k,v);
    });

    updateTimerDisplay();

    if (typeof data.currentPage === 'number') {
      goPage(data.currentPage);
    }

  } catch(err) {
    console.error(err);
  }
}

function goPage(n) {

  const prev = document.getElementById('page-' + currentPage);
  const next = document.getElementById('page-' + n);

  if (currentPage === n) return;

  prev.classList.remove('active');

  if (n > currentPage) {
    prev.classList.add('prev');
  }

  setTimeout(() => prev.classList.remove('prev'), 300);

  next.classList.add('active');

  currentPage = n;

  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', i === n);
  });

  if (n === 4) renderEsito();

  saveState();
}

function nextPage() {
  if (currentPage < 4) goPage(currentPage + 1);
}

function prevPage() {
  if (currentPage > 0) goPage(currentPage - 1);
}

function setBias(v) {

  S.bias = v;

  ['long','short','range','dir'].forEach(k => {
    document.getElementById('bb-' + k).classList.toggle('sel', k === v);
  });

  const labels = {
    long:'↑ LONG',
    short:'↓ SHORT',
    range:'↔ RANGE',
    dir:'→ DIR'
  };

  const cls = {
    long:'cb-ok',
    short:'cb-stop',
    range:'cb-warn',
    dir:'cb-ok'
  };

  const b = document.getElementById('badge-bias');

  b.textContent = labels[v];
  b.className = 'cbadge ' + cls[v];

  document.getElementById('card-bias').classList.add('ok');

  saveState();
}

function setSweep(v) {

  S.sweep = v;

  document.getElementById('sw-yes').classList.toggle('active', v === true);
  document.getElementById('sw-no').classList.toggle('active', v === false);

  const b = document.getElementById('badge-sweep');

  b.textContent = v ? 'CONFERMATO' : 'FALLITO';

  b.className = 'cbadge ' + (v ? 'cb-ok' : 'cb-stop');

  document.getElementById('card-sweep').classList.toggle('ok', v === true);
  document.getElementById('card-sweep').classList.toggle('bad', v === false);

  updateTabStates();

  saveState();

  if (!v) {
    setTimeout(() => goPage(4), 300);
  }
}

function setEv(key,val) {

  S.ev[key] = val;

  document.getElementById('ev-' + key).classList.toggle('ok', val === true);
  document.getElementById('ev-' + key).classList.toggle('bad', val === false);

  document.getElementById(key + '-y').classList.toggle('active', val === true);
  document.getElementById(key + '-n').classList.toggle('active', val === false);

  updateScore();
  updateTabStates();

  saveState();
}

function updateScore() {

  const keys = ['cvd','bta','jtc'];

  const yes = keys.filter(k => S.ev[k] === true).length;
  const answered = keys.filter(k => S.ev[k] !== null).length;

  const b = document.getElementById('badge-ev');

  b.textContent = yes + ' / 3';

  b.className = 'cbadge ' + (
    yes >= 2 ? 'cb-ok' :
    yes === 1 ? 'cb-warn' :
    'cb-stop'
  );

  const vm = document.getElementById('verdict-mini');

  if (yes === 3) {
    vm.textContent = '⚡ PERFETTO';
    vm.style.color = 'var(--green)';
  }
  else if (yes === 2) {
    vm.textContent = '✓ VALIDO';
    vm.style.color = 'var(--gold)';
  }
  else if (yes === 1) {
    vm.textContent = '⚠ DEBOLE';
    vm.style.color = 'var(--orange)';
  }
  else if (answered > 0) {
    vm.textContent = '✕ STOP';
    vm.style.color = 'var(--red)';
  }
  else {
    vm.textContent = '';
  }
}

function updateTabStates() {

  const t1 = document.getElementById('tab-1');

  if (S.sweep === true) {
    t1.classList.add('done');
  }

  if (S.sweep === false) {
    t1.classList.add('warn');
  }

  const yes = ['cvd','bta','jtc']
    .filter(k => S.ev[k] === true)
    .length;

  const t2 = document.getElementById('tab-2');

  if (yes >= 2) {
    t2.classList.add('done');
  }
}

function renderEsito() {

  const el = document.getElementById('esito-content');

  const keys = ['cvd','bta','jtc'];

  const yes = keys.filter(k => S.ev[k] === true).length;

  if (S.sweep === false) {

    el.innerHTML = `
      <div class="result-card">
        <div class="result-inner">
          <div class="result-title" style="color:var(--red)">
            ✕ NESSUN TRADE
          </div>
          <div class="result-sub">
            Sweep fallito — sessione chiusa.
          </div>
        </div>
      </div>
    `;

    return;
  }

  if (yes >= 2) {

    el.innerHTML = `
      <div class="result-card">
        <div class="result-inner">

          <div class="result-title" style="color:var(--gold)">
            ${yes === 3 ? '⚡ PIANO A' : '✓ SETUP VALIDO'}
          </div>

          <div class="targets">

            <div class="tbox">
              <div class="tc">C1</div>
              <div class="trr">1:3</div>
              <div class="tact">Chiudi</div>
            </div>

            <div class="tbox">
              <div class="tc">C2</div>
              <div class="trr">1:6</div>
              <div class="tact">Chiudi</div>
            </div>

            <div class="tbox">
              <div class="tc">C3</div>
              <div class="trr">1:10</div>
              <div class="tact">Runner</div>
            </div>

          </div>

          <div class="result-note">
            ⏱ Trade oltre 2 minuti? Valuta chiusura manuale.
          </div>

        </div>
      </div>
    `;

    return;
  }

  if (yes === 1) {

    el.innerHTML = `
      <div class="result-card">
        <div class="result-inner">
          <div class="result-title" style="color:var(--orange)">
            ⚠ SETUP DEBOLE
          </div>
          <div class="result-sub">
            Attendi una seconda conferma.
          </div>
        </div>
      </div>
    `;

    return;
  }

  el.innerHTML = `
    <div class="result-card">
      <div class="result-inner">
        <div class="result-sub">
          Completa checklist.
        </div>
      </div>
    </div>
  `;
}

function timerToggle() {

  if (timerRunning) {

    clearInterval(timerInterval);

    timerRunning = false;

    document.getElementById('tbtn').textContent = '▶ START';

    saveState();

  } else {

    timerRunning = true;

    document.getElementById('tbtn').textContent = '⏹ STOP';

    saveState();

    timerInterval = setInterval(() => {

      timerSec++;

      updateTimerDisplay();

      saveState();

    },1000);
  }
}

function timerReset() {

  clearInterval(timerInterval);

  timerRunning = false;

  timerSec = 0;

  document.getElementById('tbtn').textContent = '▶ START';

  updateTimerDisplay();

  saveState();
}

function updateTimerDisplay() {

  const m = Math.floor(timerSec / 60);
  const s = timerSec % 60;

  const el = document.getElementById('timer-display');

  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;

  el.className = 'timer';

  if (timerSec >= 60) {
    el.classList.add('warn');
  }

  if (timerSec >= 120) {
    el.classList.remove('warn');
    el.classList.add('danger');

    document.getElementById('timer-warn').style.display = 'block';
  } else {
    document.getElementById('timer-warn').style.display = 'none';
  }
}

function fullReset() {

  localStorage.removeItem('nq-live-state');

  location.reload();
}

window.addEventListener('beforeunload', () => {
  clearInterval(timerInterval);
});

loadState();
updateScore();
</script></body>
</html>
